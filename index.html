<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glean Product Agent</title>
    <script defer src="https://app.glean.com/embedded-search-latest.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #ffffff;
        }

        #glean-app {
            height: 100%;
            width: 100%;
        }

        /* STAGE 1: Aggressive CSS Hiding */
        /* This targets the sidebar classes commonly used by Glean */
        [class*="sidebar"], 
        [class*="Sidebar"], 
        [class*="nav"], 
        [class*="LeftNav"],
        aside {
            display: none !important;
            width: 0 !important;
            visibility: hidden !important;
        }

        /* STAGE 2: Force the main chat area to take up 100% width */
        main, [class*="MainContent"], [class*="ChatContainer"] {
            margin-left: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }
    </style>
</head>
<body>

    <div id="glean-app"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const initGlean = setInterval(() => {
                if (window.GleanWebSDK) {
                    clearInterval(initGlean);
                    
                    GleanWebSDK.renderChat(document.getElementById('glean-app'), {
                        agentId: "84a6c451f15f4f6fa057c58db962d0ff",
                        hideSidebar: true,
                        showCloseButton: false,
                        // Adding extra parameters to force a "embedded" feel
                        embedded: true,
                        containerType: "full-width" 
                    });

                    // STAGE 3: Javascript "Clean up" 
                    // This waits 2 seconds after loading to find and delete the sidebar manually
                    setTimeout(() => {
                        const sidebar = document.querySelector('[class*="sidebar"]') || 
                                        document.querySelector('aside') || 
                                        document.querySelector('[class*="nav"]');
                        if (sidebar) {
                            sidebar.style.display = 'none';
                        }
                    }, 2000);
                }
            }, 100);
        });
    </script>
</body>
</html>
